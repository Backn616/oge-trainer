<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 2 — Questions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="../../../style_common.css" />

  <style>
    .q-layout{
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap:28px 36px;
      align-items:start;
      max-width:1500px;
      margin-inline:auto;
    }
    .q-left h2{ margin:0 0 10px; font-size:28px; line-height:1.2; }
    .q-left p{ font-size:22px; line-height:1.55; margin:0 0 10px; }
    .ad-title{ font-weight:800; font-size:30px; margin:6px 0 12px; text-align:center; }
    .ad-figure{ width:100%; aspect-ratio:3/2; border-radius:12px; overflow:hidden; box-shadow:var(--shadow); background:#ddd; }
    .ad-figure>img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }
    .actions{ grid-column:1 / -1; text-align:center; margin-top:10px; margin-bottom:6px; }
    @media (max-width:1100px){ .q-layout{ grid-template-columns:1fr; gap:22px; } }

    /* Большой «3–2–1» */
    .timer{
      font-size:70px;
      margin:30px 0;
      font-weight:700;
      color:var(--primary);
      letter-spacing:4px;
      text-shadow:0 4px 12px rgba(0,0,0,.25);
      transition:transform .25s ease;
      will-change:transform;
      text-align:center;
    }
    @media (prefers-reduced-motion: reduce){ .timer{ transition:none; } }
  </style>

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <div class="content-wrapper">
    <!-- Секция отсчёта 3-2-1 -->
    <div id="timer" class="timer" aria-live="polite">3</div>

    <!-- Основная раскладка вопросов -->
    <div id="qWrap" class="q-layout" style="display:none">
      <section class="q-left" aria-live="polite">
        <h2 id="qTitle">Question 1.</h2>
        <p id="qLine">1) Ask a direct question about the following: <b>minimum age.</b></p>
      </section>

      <aside aria-label="Advertisement">
        <h3 class="ad-title">Join our bike club!</h3>
        <figure class="ad-figure">
          <img src="task2_bike.jpg" alt="Bike club advertisement image" loading="lazy">
        </figure>
      </aside>

      <div class="actions">
        <button id="nextBtn" class="button" type="button">Далее</button>
      </div>
    </div>
  </div>

  <!-- Прогресс-бар -->
  <div id="progressContainerFixed" role="timer" aria-live="polite" style="display:none">
    <div id="progressBarFixed" class="rAF">
      <span id="progressTime" class="progress-time">00:20</span>
    </div>
  </div>

  <!-- ЛОГИКА -->
  <script type="module">
    import { toggleThemeInit, navigateOnce, fmtTime } from "../../../common.js";

    toggleThemeInit();

    // ===== Тексты вопросов =====
    const QUESTIONS = [
      { title: "Question 1.", line: "1) Ask a direct question about the following: <b>minimum age.</b>" },
      { title: "Question 2.", line: "2) Ask a direct question about the following: <b>special clothes.</b>" },
      { title: "Question 3.", line: "3) Ask a direct question about the following: <b>bicycle rental.</b>" },
      { title: "Question 4.", line: "4) Ask a direct question about the following: <b>competitions.</b>" }
    ];

    // ===== DOM / Ключи =====
    const META_KEY  = 'ege2_meta';
    const PARTS_KEY = 'ege2_audio_parts';

    const timerEl  = document.getElementById('timer');
    const qWrap    = document.getElementById('qWrap');
    const qTitleEl = document.getElementById('qTitle');
    const qLineEl  = document.getElementById('qLine');
    const nextBtn  = document.getElementById('nextBtn');
    const barWrap  = document.getElementById('progressContainerFixed');
    const barEl    = document.getElementById('progressBarFixed');
    const timeEl   = document.getElementById('progressTime');
    const RESULT_URL = location.pathname.replace(/_3_task\.html$/i, '_4_result.html');

    // ===== SpeechSynthesis: озвучка номера вопроса =====
    function speakQuestion(num){
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance("Question " + num);
        u.lang = "en-US"; u.rate = 1.0; u.pitch = 1.0;
        return new Promise(resolve=>{
          const to = setTimeout(resolve, 1500);
          u.onend = () => { clearTimeout(to); resolve(); };
          u.onerror = () => { clearTimeout(to); resolve(); };
          speechSynthesis.speak(u);
        });
      }catch{ return Promise.resolve(); }
    }

    // ===== Микрофон (инициализируем ПАРАЛЛЕЛЬНО) =====
    let streamRef=null, recorder=null, chunks=[];
    let chosenMime='';
    let micReadyPromise = null;

    function pickMimeType(){
      const cands = ['audio/webm;codecs=opus','audio/webm','audio/mp4','audio/ogg;codecs=opus','audio/ogg'];
      for (const t of cands) if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
      return '';
    }

    async function initMic(){
      try{
        streamRef = await navigator.mediaDevices.getUserMedia({ audio:true });
        chosenMime = pickMimeType();
        try{
          recorder = chosenMime ? new MediaRecorder(streamRef, { mimeType: chosenMime })
                                : new MediaRecorder(streamRef);
        }catch{
          recorder = new MediaRecorder(streamRef);
          chosenMime = recorder.mimeType || '';
        }
        recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
        recorder.onstop = handleStop;
      }catch(err){
        // если отказ — всё равно дадим пройти вопросы, просто без записи
        console.warn('Mic init failed:', err);
        recorder = null;
      }
    }

    // ===== Отсчёт 3-2-1 (не блокируем initMic) =====
    let countdown = 3;
    const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function startCountdown(){
      timerEl.style.display = 'block';
      timerEl.textContent = countdown;
      const id = setInterval(()=>{
        timerEl.style.color = (countdown > 1) ? '#2b6cff' : '#b30000';
        if (!reduceMotion){
          timerEl.style.transform = 'scale(1.2)';
          setTimeout(()=>{ timerEl.style.transform = 'scale(1)'; }, 180);
        }
        timerEl.textContent = countdown;
        countdown--;
        if (countdown < 0){
          clearInterval(id);
          timerEl.style.display = 'none';
          startQuestionFlow();
        }
      }, 1000);
    }

    // ===== Устойчивый таймер (rAF + setInterval + deadline) =====
    const QUESTION_MS = 20_000;
    let qIdx = 0;
    let startedAt = 0;
    let deadlineMs = 0;
    let rafId = 0, intId = 0, hardTO = 0;
    let finishing = false;

    function renderQuestion(){
      const q = QUESTIONS[qIdx];
      qTitleEl.textContent = q.title;
      qLineEl.innerHTML = q.line;
    }

    function startQuestionFlow(){
      qWrap.style.display = 'grid';
      barWrap.style.display = 'block';
      qIdx = 0;
      renderQuestion();
      beginSegment();
    }

    async function beginSegment(){
      // Озвучка
      await speakQuestion(qIdx + 1);

      // ждём готовность микрофона (если есть) — но не блокируем навсегда
      if (!micReadyPromise) micReadyPromise = initMic();
      try{ await micReadyPromise; }catch{}

      // UI
      timeEl.textContent = fmtTime(QUESTION_MS);
      barEl.style.width = '100%';

      // Запись (если доступна)
      chunks = [];
      try { if (recorder && recorder.state !== 'recording') recorder.start(); } catch {}

      // Дедлайн + запуск «двигателей»
      startedAt = performance.now();
      deadlineMs = startedAt + QUESTION_MS;
      finishing = false;

      stopClocks();
      tickRaf();
      intId = setInterval(tickWall, 250);
      hardTO = setTimeout(()=>{ if (!finishing) finishSegment(); }, QUESTION_MS + 2000);
    }

    function tickRaf(){
      const left = Math.max(0, deadlineMs - performance.now());
      barEl.style.width = (left / QUESTION_MS * 100) + '%';
      if (!tickRaf._last || performance.now() - tickRaf._last >= 250){
        timeEl.textContent = fmtTime(left);
        tickRaf._last = performance.now();
      }
      if (left <= 0) finishSegment();
      else rafId = requestAnimationFrame(tickRaf);
    }

    function tickWall(){
      const left = deadlineMs - performance.now();
      if (left <= 0) finishSegment();
      else timeEl.textContent = fmtTime(Math.max(0, left));
    }

    function stopClocks(){
      if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
      if (intId) { clearInterval(intId); intId = 0; }
      if (hardTO){ clearTimeout(hardTO); hardTO = 0; }
    }

    function finishSegment(){
      if (finishing) return;
      finishing = true;

      stopClocks();
      try { if (recorder && recorder.state === 'recording') recorder.stop(); }
      catch { handleStop(); }
      nextBtn.disabled = true;
    }

    // Автодобив при возврате на вкладку
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && !finishing) {
        if (performance.now() >= deadlineMs) finishSegment();
      }
    });

    function handleStop(){
      const blobType = (recorder?.mimeType || chosenMime || 'audio/webm');
      const blob = new Blob(chunks, { type: blobType });
      const durationMs = Math.min(QUESTION_MS, performance.now() - startedAt);

      const reader = new FileReader();
      reader.onloadend = () => {
        try{
          const b64 = (reader.result || '').toString().split(',')[1] || '';
          const parts = JSON.parse(sessionStorage.getItem(PARTS_KEY) || '[]');
          parts[qIdx] = { mime: blobType, b64, durationMs, qIdx };
          sessionStorage.setItem(PARTS_KEY, JSON.stringify(parts));
        }catch{}

        qIdx++;
        if (qIdx < QUESTIONS.length){
          renderQuestion();
          nextBtn.disabled = false;
          beginSegment();
        } else {
          try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
          navigateOnce(RESULT_URL);
        }
      };
      reader.readAsDataURL(blob);
    }

    // «Далее» — досрочно завершает сегмент
    nextBtn.addEventListener('click', finishSegment);

    // ===== Старт: микрофон в ПАРАЛЛЕЛЬ, отсчёт СРАЗУ =====
    (function init(){
      micReadyPromise = initMic(); // не await!
      startCountdown();
    })();

    // BFCache и очистка
    window.addEventListener('pageshow', () => { navigateOnce.lock = false; });
    window.addEventListener('beforeunload', ()=>{
      try{ stopClocks(); }catch{}
      try{ if (recorder && recorder.state === 'recording') recorder.stop(); }catch{}
      try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
    });
  </script>
</body>
</html>
