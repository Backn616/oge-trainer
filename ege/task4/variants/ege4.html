<!-- task4/ege4.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЕГЭ — Задание 4: выбор варианта</title>
  <meta name="description" content="Выбор варианта для задания 4 устной части ЕГЭ. Запись ответа и прослушивание." />

  <!-- Шрифт: ускорение загрузки и единый с проектом -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили проекта -->
  <link rel="stylesheet" href="style_common.css" />

  <!-- Анти-мигание темы -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>

  <style>
    /* Лёгкая вёрстка под список вариантов — в духе общего стиля */
    .wrap{
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }
    header{
      display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px;
    }
    .brand{
      display:flex; align-items:center; gap:12px; text-align:left;
      background:var(--card); border-radius:12px; padding:10px 14px; box-shadow:var(--shadow);
    }
    .brand b{ display:block; font-size:18px; }
    .brand small{ display:block; color:var(--muted); margin-top:2px; }

    /* Карточка-контейнер (используем task-container для единого вида) */
    .picker-card.task-container{ margin-top: 8px; }
    .picker-sub{ color:var(--muted); margin:8px 0 18px; }

    /* Сетка вариантов */
    .grid-variants{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    /* Кнопка варианта — компактнее, чем .button */
    .variant-btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:14px 18px;
      min-height:52px;
      border:none; border-radius:12px; cursor:pointer;
      font-size:18px; font-weight:600; color:#fff;
      background:linear-gradient(135deg, var(--primary), var(--primary-600));
      box-shadow:0 10px 22px rgba(43,108,255,.28);
      transition: transform .06s ease, filter .2s ease, box-shadow .2s ease;
    }
    .variant-btn:hover{ transform: translateY(-1px); filter: brightness(1.03); }
    .variant-btn:focus-visible{ outline:none; box-shadow:0 0 0 4px var(--ring); }

    /* Пагинация */
    .pager{
      display:flex; align-items:center; justify-content:center; gap:12px; margin-top:18px;
    }
    .pager .button{ padding:10px 16px; font-size:16px; }
    .pager-info{ color:var(--muted); font-size:14px; }

    footer{ color:var(--muted); font-size:13px; margin-top:18px; text-align:center; }
  </style>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <div class="content-wrapper wrap">
    <header>
      <a id="backToMenuTop" class="brand" href="#" aria-label="Назад к списку заданий">
        <div>
          <b>Онлайн‑тренажёр «Говорение»</b>
          <small>ЕГЭ · задание 4</small>
        </div>
      </a>
      <a id="backToMenuLink" class="button" href="#" aria-label="К выбору задания">← К выбору задания</a>
    </header>

    <section class="task-container picker-card" aria-labelledby="h1">
      <b id="h1">ЕГЭ — задание 4: выбери вариант</b>
      <p class="picker-sub">Нажми на вариант, затем запиши и прослушай свой ответ.</p>

      <nav id="variants" class="grid-variants" aria-label="Варианты задания 4"></nav>

      <div class="pager" aria-label="Пагинация вариантов">
        <button id="prevBtn" class="button" type="button" aria-label="Предыдущая страница">← Назад</button>
        <div id="pagerInfo" class="pager-info" aria-live="polite"></div>
        <button id="nextBtn" class="button" type="button" aria-label="Следующая страница">Вперёд →</button>
      </div>
    </section>

    <footer>© 2025 — Демо‑версия тренажёра ЕГЭ.</footer>
  </div>

  <script type="module">
    import { toggleThemeInit, navigateOnce } from '../common.js';

    // Тема
    toggleThemeInit();

    // Надёжная база пути вида /.../ege/
    function getEgeBase() {
      const parts = location.pathname.split('/').filter(Boolean);
      const i = parts.indexOf('ege');
      const base = (i !== -1) ? ('/' + parts.slice(0, i + 1).join('/') + '/') : '/ege/';
      return base.replace(/\/{2,}/g, '/');
    }
    const EGE_BASE = getEgeBase();

    // Кнопки "Назад к меню"
    const menuURL = `${EGE_BASE}ege_menu.html`;
    const backTop = document.getElementById('backToMenuTop');
    const backBtn = document.getElementById('backToMenuLink');
    backTop.href = menuURL; backBtn.href = menuURL;

    // Варианты + пагинация
    const TOTAL_VARIANTS = 60;
    const PAGE_SIZE      = 15;

    const variantsEl = document.getElementById('variants');
    const prevBtn    = document.getElementById('prevBtn');
    const nextBtn    = document.getElementById('nextBtn');
    const pagerInfo  = document.getElementById('pagerInfo');

    // Память о последней странице и выбранном варианте (необязательная «приятность»)
    const LAST_PAGE_KEY = 'ege4_lastPage';
    const LAST_VAR_KEY  = 'ege4_lastVariant';

    let currentPage = Math.max(1, Math.min(
      Math.ceil((Number(sessionStorage.getItem(LAST_VAR_KEY)) || 1) / PAGE_SIZE) ||
      Number(sessionStorage.getItem(LAST_PAGE_KEY)) || 1,
      Math.ceil(TOTAL_VARIANTS / PAGE_SIZE)
    ));
    const totalPages = Math.ceil(TOTAL_VARIANTS / PAGE_SIZE);

    function goToVariant(n) {
      try { sessionStorage.setItem(LAST_VAR_KEY, String(n)); } catch {}
      const url = `${EGE_BASE}task4/variants/variant${n}/ege4_var${n}_1_prepare.html`
        .replace(/\/{2,}/g, '/')
        .replace(':/', '://');
      navigateOnce(url);
    }

    function renderPage(page){
      const safePage = Math.min(Math.max(1, page), totalPages);
      currentPage = safePage;
      try { sessionStorage.setItem(LAST_PAGE_KEY, String(currentPage)); } catch {}

      variantsEl.innerHTML = '';
      const start = (currentPage - 1) * PAGE_SIZE + 1;
      const end   = Math.min(TOTAL_VARIANTS, start + PAGE_SIZE - 1);

      const frag = document.createDocumentFragment();
      for(let n = start; n <= end; n++){
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'variant-btn';
        btn.textContent = `Вариант ${n}`;
        btn.setAttribute('aria-label', `Перейти к варианту ${n}`);
        btn.addEventListener('click', () => goToVariant(n));
        frag.appendChild(btn);
      }
      variantsEl.appendChild(frag);

      pagerInfo.textContent = `Стр. ${currentPage} из ${totalPages} · ${start}–${end} из ${TOTAL_VARIANTS}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
    }

    prevBtn.addEventListener('click', () => renderPage(currentPage - 1));
    nextBtn.addEventListener('click', () => renderPage(currentPage + 1));

    // Первый рендер
    renderPage(currentPage);

    // BFCache: снять замок для navigateOnce
    window.addEventListener('pageshow', () => { navigateOnce.lock = false; });
  </script>
</body>
</html>
