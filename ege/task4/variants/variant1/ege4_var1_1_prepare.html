<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 4 — Подготовка</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="../../../style_common.css" />

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if(saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <main class="card" role="dialog" aria-labelledby="prepTitle" aria-describedby="prepText">
    <h1 id="prepTitle">Подготовка</h1>
    <p id="prepText">
      На следующем шаге у вас будет <strong>1 минута</strong> на подготовку.<br><br>
      Постарайтесь внимательно ознакомиться с заданием и продумать ответ.<br><br>
      Когда будете готовы — нажмите кнопку, чтобы начать подготовку.
    </p>

    <a id="nextLink"
       class="button"
       href="#"
       role="button"
       aria-label="Перейти к этапу подготовки">
      ▶ Начать подготовку
    </a>
  </main>

  <!-- Общий JS -->
  <script src="../../../common.js"></script>
  <script>
    // === Навигация ===
    const NEXT_URL = location.pathname.replace(/_1_prepare\.html$/i, '_2_mic.html');
    const a = document.getElementById('nextLink');
    a.href = NEXT_URL;
  </script>
</body>
</html>
