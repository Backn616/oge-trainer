<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 3 — Interview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Общие стили проекта -->
  <link rel="stylesheet" href="../../../style_common.css" />

  <style>
    .q-wrap{
      max-width: 1100px;
      margin: 0 auto;
      background: var(--card);
      border-left: 5px solid var(--primary);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 24px 28px;
    }
    .q-head{
      display:flex; align-items:center; justify-content:space-between;
      gap:16px; margin-bottom:8px;
    }
    .q-title{ font-size:28px; font-weight:800; margin:0; }
    .q-body{ font-size:20px; line-height:1.6; }
    .state{
      display:inline-block; padding:6px 10px; border-radius:10px;
      background:#eef4ff; color:#1f58d9; font-size:14px; font-weight:700;
    }
    .dark .state{ background:rgba(255,255,255,.08); color:#a9c6ff; }

    .timer{
      font-size:70px; margin:30px 0; font-weight:700;
      color:var(--primary); letter-spacing:4px; text-shadow:0 4px 12px rgba(0,0,0,.25);
      text-align:center;
    }
    .hint{
      position:fixed; left:50%; bottom:calc(var(--footer-h) + 16px);
      transform:translateX(-50%);
      background:var(--card); color:var(--text);
      border:1px solid #ffffff22; border-radius:12px; padding:10px 14px;
      box-shadow:var(--shadow); font-size:14px; z-index:9999;
    }

    /* интро-карточка перед вопросами */
    #introBox{ margin-bottom:18px; }

    /* кнопка под рамкой — «ниже на 10 см» */
    #nextBtnWrap{
      text-align:center;
      margin: 10cm 0 30px;   /* именно сантиметры, как просил */
      display:none;
      width:100%;
    }
  </style>

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Переключатель темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <!-- ВЕРХ: отсчёт 3-2-1 -->
  <div class="content-wrapper" id="countdownWrap">
    <div id="timer" class="timer" aria-live="polite">3</div>
  </div>

  <!-- ОСНОВНОЙ БЛОК -->
  <main class="content-wrapper" id="mainWrap" style="display:none">
    <!-- интро-экран перед вопросами -->
    <section class="task-container" id="introBox" aria-live="polite">
      <b>Task 3.</b> Interviewer
    </section>

    <!-- экран вопросов -->
    <section class="q-wrap" id="qWrap" style="display:none">
      <div class="q-head">
        <h2 class="q-title" id="qTitle">Question 1</h2>
        <div class="state" id="stateBadge" aria-live="polite">Playing question…</div>
      </div>
      <div class="q-body" id="qBody">Listen to the question, then answer in 40 seconds.</div>
    </section>

    <!-- кнопка НИЖЕ рамки -->
    <div id="nextBtnWrap">
      <button id="nextBtn" class="button" type="button" aria-label="Перейти к следующему вопросу">Дальше</button>
    </div>
  </main>

  <!-- Проставка, чтобы фикс‑бар не наезжал -->
  <div style="height: calc(var(--footer-h, 72px) + 24px);"></div>

  <!-- Фиксированный прогресс‑бар снизу — на 40 сек ответа -->
  <div id="progressContainerFixed" role="timer" aria-live="polite" style="display:none">
    <div id="progressBarFixed" class="rAF">
      <span id="progressTime" class="progress-time">00:40</span>
    </div>
  </div>

  <!-- ЛОГИКА -->
  <script type="module">
    import { toggleThemeInit, navigateOnce, fmtTime } from "../../../common.js";
    toggleThemeInit();

    /* ====== Сброс ключей Task 3 ====== */
    try{
      sessionStorage.removeItem('ege3_audio_base64');
      sessionStorage.removeItem('ege3_audio_mime');
    }catch{}

    /* ====== Аудио-файлы (m4a, лежат рядом со страницей) ====== */
    const INTRO_AUDIO = "intro.m4a";
    const Q_AUDIO = ["q1.m4a","q2.m4a","q3.m4a","q4.m4a","q5.m4a"];

    /* ====== DOM ====== */
    const countdownWrap = document.getElementById('countdownWrap');
    const mainWrap = document.getElementById('mainWrap');
    const timerEl  = document.getElementById('timer');

    const introBox = document.getElementById('introBox');
    const qWrap = document.getElementById('qWrap');
    const qTitleEl = document.getElementById('qTitle');
    const stateBadge = document.getElementById('stateBadge');

    const barWrap  = document.getElementById('progressContainerFixed');
    const barEl    = document.getElementById('progressBarFixed');
    const timeEl   = document.getElementById('progressTime');

    const nextBtnWrap = document.getElementById('nextBtnWrap');
    const nextBtn  = document.getElementById('nextBtn');

    const RESULT_URL = location.pathname.replace(/_3_task\.html$/i, '_4_result.html');
    const ANSWER_MS = 40_000; // 40 секунд на ответ

    /* ====== Аудио-плеер ====== */
    const audio = new Audio();
    audio.preload = 'auto';

    /* ====== Микрофон: один сеанс записи ====== */
    let streamRef=null, recorder=null, chosenMime='', recChunks=[];
    function pickMimeType(){
      const c=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg','audio/mp4'];
      for (const t of c) if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
      return '';
    }
    async function initMic(){
      streamRef = await navigator.mediaDevices.getUserMedia({ audio:true });
      chosenMime = pickMimeType();
      recorder = chosenMime ? new MediaRecorder(streamRef,{mimeType:chosenMime}) : new MediaRecorder(streamRef);
      recChunks = [];
      recorder.ondataavailable = e => { if (e.data && e.data.size) recChunks.push(e.data); };
    }

    /* ====== Таймер ответа (40 сек) ====== */
    let startedAt=0, deadlineMs=0, rafId=0, intId=0, hardTO=0, answering=false, finishing=false;

    function startAnswerWindow(){
      // показать прогресс-бар и кнопку (под рамкой)
      barWrap.style.display = 'block';
      nextBtnWrap.style.display = 'block';
      nextBtn.textContent = (qIdx === 4) ? 'Закончить' : 'Дальше';
      nextBtn.setAttribute('aria-label', (qIdx === 4) ? 'Завершить задание' : 'Перейти к следующему вопросу');

      stateBadge.textContent = 'Answer (40s)…';
      timeEl.textContent = fmtTime(ANSWER_MS);
      barEl.style.width = '100%';

      answering = true;
      startedAt = performance.now();
      deadlineMs = startedAt + ANSWER_MS;
      stopClocks();
      tickRaf();
      intId = setInterval(tickWall, 250);
      // страховка на случай подвисаний
      hardTO = setTimeout(()=>{ if(answering) endAnswerWindow(); }, ANSWER_MS + 1500);
    }

    function tickRaf(){
      const left = Math.max(0, deadlineMs - performance.now());
      barEl.style.width = (left/ANSWER_MS*100)+'%';
      if (!tickRaf._last || performance.now()-tickRaf._last>=250){
        timeEl.textContent = fmtTime(left);
        tickRaf._last = performance.now();
      }
      if (left<=0){ endAnswerWindow(); }
      else { rafId = requestAnimationFrame(tickRaf); }
    }
    function tickWall(){
      const left = deadlineMs - performance.now();
      if (left<=0) endAnswerWindow();
      else timeEl.textContent = fmtTime(Math.max(0,left));
    }
    function stopClocks(){
      if (rafId){ cancelAnimationFrame(rafId); rafId=0; }
      if (intId){ clearInterval(intId); intId=0; }
      if (hardTO){ clearTimeout(hardTO); hardTO=0; }
    }
    function endAnswerWindow(){
      if (!answering) return;
      answering = false;
      stopClocks();
      nextBtnWrap.style.display = 'none'; // спрятать кнопку перед следующим вопросом
      proceedNext();
    }

    // Клик по кнопке — сразу заканчиваем окно ответа (не ждём таймера)
    nextBtn.addEventListener('click', () => endAnswerWindow());

    /* ====== Поток: intro → q1..q5 ====== */
    let qIdx = -1; // -1 = интро, 0..4 = вопросы

    async function playIntro(){
      // показываем интро-экран, прячем экран вопросов
      introBox.style.display = 'block';
      qWrap.style.display = 'none';
      nextBtnWrap.style.display = 'none';
      barWrap.style.display = 'none';

      try{ audio.pause(); audio.currentTime = 0; }catch{}
      audio.src = INTRO_AUDIO;
      try{ await audio.play(); }catch{ showPlayHintAndRetry(); }
    }

    async function playQuestion(n){
      // показываем экран вопросов, прячем интро
      introBox.style.display = 'none';
      qWrap.style.display = 'block';
      nextBtnWrap.style.display = 'none'; // кнопки нет, пока звучит вопрос
      barWrap.style.display = 'none';     // бегунок только в окне ответа

      qTitleEl.textContent = `Question ${n} of 5`;
      stateBadge.textContent = 'Playing question…';
      try{ audio.pause(); audio.currentTime = 0; }catch{}
      audio.src = Q_AUDIO[n-1];
      try{ await audio.play(); }catch{ showPlayHintAndRetry(); }
    }

    audio.addEventListener('ended', () => {
      if (qIdx === -1){
        qIdx = 0;              // закончилось интро → первый вопрос
        playQuestion(1);
      } else {
        startAnswerWindow();   // закончилось аудио вопроса → 40 сек ответа и кнопка
      }
    });
    audio.addEventListener('error', () => {
      if (qIdx === -1){
        qIdx = 0;
        playQuestion(1);
      } else {
        startAnswerWindow();
      }
    });

    function proceedNext(){
      qIdx++;
      if (qIdx < 5){
        playQuestion(qIdx+1);
      } else {
        finishAll();
      }
    }

    /* ====== Завершение, сохранение, переход ====== */
    async function finishAll(){
      if (finishing) return;
      finishing = true;
      stopClocks();
      try{ audio.pause(); }catch{}
      try{
        if (recorder && recorder.state !== 'inactive'){
          recorder.onstop = saveAndGo;
          recorder.stop();
        }else{
          saveAndGo();
        }
      }catch{ saveAndGo(); }
    }

    async function saveAndGo(){
      try{
        await new Promise(r=>setTimeout(r,0));
        const blob = recChunks && recChunks.length ? new Blob(recChunks, { type: chosenMime || 'audio/webm' }) : null;
        if (blob){
          const reader = new FileReader();
          reader.onloadend = () => {
            try{
              sessionStorage.setItem('ege3_audio_base64', reader.result.toString());
              sessionStorage.setItem('ege3_audio_mime', blob.type || 'audio/webm');
              const meta = JSON.parse(sessionStorage.getItem('ege3_meta') || '{}');
              meta.finishedAt = Date.now();
              sessionStorage.setItem('ege3_meta', JSON.stringify(meta));
            }catch{}
            cleanupAndNavigate();
          };
          reader.readAsDataURL(blob);
        }else{
          cleanupAndNavigate();
        }
      }catch{
        cleanupAndNavigate();
      }
    }

    function cleanupAndNavigate(){
      try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
      navigateOnce(RESULT_URL);
    }

    /* ====== Старт ====== */
    function startCountdown(){
      let n = 3;
      timerEl.textContent = n;
      const id = setInterval(()=>{
        timerEl.textContent = n;
        n--;
        if (n < 0){
          clearInterval(id);
          countdownWrap.style.display = 'none';
          mainWrap.style.display = 'block';
          startFlow();
        }
      }, 1000);
    }

    async function startFlow(){
      qIdx = -1; // начинаем с интро
      try{
        await initMic();
        recorder.start(1000);
        try{
          const meta = JSON.parse(sessionStorage.getItem('ege3_meta') || '{}');
          meta.taskStartedAt = Date.now();
          sessionStorage.setItem('ege3_meta', JSON.stringify(meta));
        }catch{}
      }catch(err){ console.warn('Mic init error:', err); }
      playIntro();
    }

    function freshStart(){
      countdownWrap.style.display = 'block';
      mainWrap.style.display = 'none';
      stopClocks();
      answering = false;
      finishing = false;
      nextBtnWrap.style.display = 'none';
      startCountdown();
    }
    freshStart();

    function isBackForward(){
      try{
        const nav = performance.getEntriesByType('navigation')[0];
        return nav && nav.type === 'back_forward';
      }catch{ return false; }
    }
    window.addEventListener('pageshow', (e)=>{
      if (e.persisted || isBackForward()){
        freshStart();
      }else{
        navigateOnce.lock = false;
      }
    });

    window.addEventListener('beforeunload', ()=>{
      try{ if (recorder && recorder.state==='recording') recorder.stop(); }catch{}
      try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
      try{ audio.pause(); }catch{}
    });

    /* ====== Подсказка для автоплея (если заблокирован звук) ====== */
    function showPlayHintAndRetry(){
      if (document.querySelector('.hint')) return;
      const el = document.createElement('div');
      el.className = 'hint';
      el.textContent = '🔊 Click anywhere to enable sound';
      document.body.appendChild(el);
      const resume = () => {
        el.remove();
        window.removeEventListener('click', resume);
        window.removeEventListener('touchstart', resume);
        audio.play().catch(()=>{});
      };
      window.addEventListener('click', resume, { passive:true });
      window.addEventListener('touchstart', resume, { passive:true });
    }
  </script>
</body>
</html>
