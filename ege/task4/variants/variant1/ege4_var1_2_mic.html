<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Предупреждение — доступ к микрофону</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифт: ускорение загрузки -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили (фон/карточка/кнопка) -->
  <link rel="stylesheet" href="../../style_common.css">

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <main class="page-center">
    <section class="card" role="dialog" aria-labelledby="warnTitle" aria-describedby="warnText">
      <h1 id="warnTitle">Внимание</h1>
      <p id="warnText">
        На следующем этапе тренажёр попытается получить доступ к микрофону.<br><br>
        Браузер покажет системный запрос на использование микрофона.<br><br>
        Если вы готовы выполнить устную часть задания 4, пожалуйста,<br>
        <strong>разрешите сайту использовать микрофон</strong>, чтобы начать запись ответа.
      </p>

      <!-- Ставим href (fallback без JS) и дублируем переход через JS с защитой -->
      <a id="nextLink"
         class="button"
         href="#"
         role="button"
         aria-label="Перейти к заданию с запросом доступа к микрофону">
        ОК
      </a>
    </section>
  </main>

  <script type="module">
    import { toggleThemeInit, navigateOnce } from '../../common.js';

    // Тема
    toggleThemeInit();

    // Следующая страница (task)
    const NEXT_URL = /_2_mic\.html$/i.test(location.pathname)
      ? location.pathname.replace(/_2_mic\.html$/i, '_3_task.html')
      : location.pathname.replace(/\.html$/i, '_3_task.html');

    // Подготовка sessionStorage для задания 4
    try {
      sessionStorage.removeItem('ege4_audio_base64'); // на всякий случай — старая запись
      sessionStorage.removeItem('ege4_audio_mime');
      sessionStorage.setItem('ege4_warned', '1');     // маркер показа предупреждения
      const meta = JSON.parse(sessionStorage.getItem('ege4_meta') || '{}');
      meta.warnedAt = Date.now();
      sessionStorage.setItem('ege4_meta', JSON.stringify(meta));
    } catch {}

    // Кнопка «ОК» — единственная точка перехода
    const a = document.getElementById('nextLink');
    a.href = NEXT_URL; // fallback, если JS отключён
    a.addEventListener('click', (e) => {
      e.preventDefault();
      navigateOnce(NEXT_URL);
    });

    // Возврат по Back/Forward (BFCache): просто снимаем замок, чтобы кнопка снова работала
    window.addEventListener('pageshow', () => {
      navigateOnce.lock = false;
    });

    // ВАЖНО: никаких автопереходов при сворачивании/уходе
    // (никаких visibilitychange/pagehide/freeze)
  </script>
</body>
</html>
