<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Экзамен — переход к следующему заданию</title>

  <!-- Анти-мигание темы -->
  <script>
    (function(){try{
      const saved = localStorage.getItem('pref-theme') || 'light';
      if (saved === 'dark') document.documentElement.classList.add('dark');
    }catch{}})();
  </script>

  <style>
    :root{
      --primary:#2b6cff; --text:#0b1020; --muted:#5a6475; --card:#fff;
      --bg:#f7f9ff; --shadow: 0 10px 25px rgba(17,24,39,.08);
    }
    .dark{
      --primary:#6aa3ff; --text:#eaf0ff; --muted:#b9c2d3; --card:rgba(255,255,255,.08);
      --bg:#0b1020; --shadow: 0 10px 35px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); display:grid; place-items:center; min-height:100dvh;
    }
    .card{
      background:var(--card); border-left:5px solid var(--primary);
      border-radius:14px; box-shadow:var(--shadow); padding:28px 32px; max-width:680px;
      text-align:center;
    }
    h1{margin:0 0 10px; font-size:26px; color:var(--primary)}
    p{margin:6px 0; color:var(--muted); font-size:16px}
    .timer{font-weight:800; font-size:22px; margin-top:12px}
  </style>
</head>
<body>
  <div class="card" role="status" aria-live="polite">
    <h1>Подготовка следующего шага…</h1>
    <p id="info">Сейчас откроется следующее задание.</p>
    <div class="timer">Переход через <span id="sec">3</span>…</div>
  </div>

  <script type="module">
    import { toggleThemeInit, examModeInit, navigateOnce } from './common.js';
    toggleThemeInit();
    examModeInit(); // включит exam_flow, если есть ?exam=1

    // --- Параметры URL / sessionStorage
    const qs = new URLSearchParams(location.search);
    const next = Math.max(2, Math.min(4, parseInt(qs.get('next') || '2', 10) || 2));
    const variantQs = (qs.get('variant') || '').replace(/\D+/g,'');
    const variantSS = (sessionStorage.getItem('exam_variant') || '').replace(/\D+/g,'');
    const variant = variantQs || variantSS || '1';

    // Инфо для пользователя
    const names = {2:'Task 2', 3:'Task 3', 4:'Task 4'};
    document.getElementById('info').textContent = `Открываем ${names[next] || 'следующий шаг'} для варианта ${variant}…`;

    // --- Формирование следующего URL c exam=1
    function nextPrepareUrl(){
      if (next > 4) {
        // страховка; обычно сюда не попадаем
        return `./exams_result.html?exam=1&variant=${encodeURIComponent(variant)}`;
      }
      return `./task${next}/variants/variant${variant}/ege${next}_var${variant}_1_prepare.html?exam=1&variant=${encodeURIComponent(variant)}`
        .replace(/\/{2,}/g,'/').replace(':/','://');
    }

    const target = nextPrepareUrl();

    // --- 3-секундный отсчёт и переход
    const secEl = document.getElementById('sec');
    let left = 3;
    const iv = setInterval(()=>{
      left -= 1;
      if (left <= 0){
        clearInterval(iv);
        navigateOnce(target);
      } else {
        secEl.textContent = String(left);
      }
    }, 1000);

    // Снять «замок» при возврате из BFCache
    window.addEventListener('pageshow', ()=>{ navigateOnce.lock = false; });
  </script>
</body>
</html>
