<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 2 — Questions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифт -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="../../../style_common.css" />

  <style>
    .q-layout{
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap:28px 36px;
      align-items:start;
      max-width:1500px;
      margin-inline:auto;
    }
    .q-left{ text-align:left; }
    .q-left h2{
      margin:0 0 10px 0; font-size:28px; line-height:1.2;
    }
    .q-left p{ font-size:22px; line-height:1.55; margin:0 0 10px 0; }
    .ad-title{ font-weight:800; font-size:30px; margin:6px 0 12px; text-align:center; }
    .ad-figure{ width:100%; aspect-ratio: 3 / 2; border-radius:12px; overflow:hidden; box-shadow:var(--shadow); background:#ddd; }
    .ad-figure>img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }

    .actions{ grid-column:1 / -1; text-align:center; margin-top:10px; margin-bottom:6px; }
    .hint{ color:var(--muted); font-size:16px; margin-top:6px; }

    @media (max-width:1100px){ .q-layout{ grid-template-columns:1fr; gap:22px; } }
  </style>

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <div class="content-wrapper q-layout">
    <!-- Слева — текст вопроса -->
    <section class="q-left" aria-live="polite">
      <h2 id="qTitle">Question 1.</h2>
      <p id="qLine">1) Ask a direct question about the following: <b>minimum age.</b></p>
      <p class="hint">Скажи свой вопрос. У тебя 20 секунд. Можно нажать «Далее», если закончил раньше.</p>
    </section>

    <!-- Справа — заголовок над фото + фото -->
    <aside aria-label="Advertisement">
      <h3 class="ad-title">Join our bike club!</h3>
      <figure class="ad-figure">
        <!-- Место для фото -->
        <img src="task2_bike.jpg" alt="Bike club advertisement image" loading="lazy">
      </figure>
    </aside>

    <!-- Кнопки действия -->
    <div class="actions">
      <button id="nextBtn" class="button" type="button" aria-label="Перейти к следующему вопросу">Далее</button>
    </div>
  </div>

  <!-- Фиксированный прогресс-бар снизу (20 сек на каждый вопрос) -->
  <div id="progressContainerFixed" role="timer" aria-live="polite" aria-label="Оставшееся время текущего вопроса">
    <div id="progressBarFixed" class="rAF">
      <span id="progressTime" class="progress-time">00:20</span>
    </div>
  </div>

  <!-- ЛОГИКА -->
  <script type="module">
    import { toggleThemeInit, navigateOnce, fmtTime } from "../../../common.js";

    toggleThemeInit();

    const QUESTIONS = [
      { title: "Question 1.", line: "1) Ask a direct question about the following: <b>minimum age.</b>" },
      { title: "Question 2.", line: "2) Ask a direct question about the following: <b>special clothes.</b>" },
      { title: "Question 3.", line: "3) Ask a direct question about the following: <b>bicycle rental.</b>" },
      { title: "Question 4.", line: "4) Ask a direct question about the following: <b>competitions.</b>" }
    ];

    // Ключи для sessionStorage
    const META_KEY = 'ege2_meta';
    const PARTS_KEY = 'ege2_audio_parts';  // массив {mime,b64,durationMs, qIdx}
    const WARNED_KEY = 'ege2_warned';

    // UI
    const qTitleEl = document.getElementById('qTitle');
    const qLineEl  = document.getElementById('qLine');
    const nextBtn  = document.getElementById('nextBtn');
    const barEl    = document.getElementById('progressBarFixed');
    const timeEl   = document.getElementById('progressTime');

    // Таймер вопроса
    const QUESTION_MS = 20_000;
    let qIdx = 0;
    let mediaStream = null;
    let recorder = null;
    let chunks = [];
    let timerRaf = null;
    let qStartedAt = 0;

    // Обновление текста
    function renderQuestion() {
      const q = QUESTIONS[qIdx];
      qTitleEl.textContent = q.title;
      qLineEl.innerHTML = q.line;
    }

    // Старт записи одного вопроса
    async function startRecording() {
      // Готовим поток (повторно используем, если есть)
      if (!mediaStream) {
        try {
          mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
          alert('Не удалось получить доступ к микрофону. Проверьте разрешение.');
          return;
        }
      }
      chunks = [];
      recorder = new MediaRecorder(mediaStream);
      recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
      recorder.onstop = handleStop;
      recorder.start();

      // Таймер 20 сек
      qStartedAt = performance.now();
      barEl.style.width = '100%';
      tick();
    }

    function tick(nowTs) {
      const now = performance.now();
      const elapsed = now - qStartedAt;
      const left = Math.max(0, QUESTION_MS - elapsed);
      const pct = (left / QUESTION_MS) * 100;
      barEl.style.width = pct + '%';
      timeEl.textContent = fmtTime(left);

      if (left <= 0) {
        finishSegment(); // авто-переход
      } else {
        timerRaf = requestAnimationFrame(tick);
      }
    }

    function stopTimer() {
      if (timerRaf != null) {
        cancelAnimationFrame(timerRaf);
        timerRaf = null;
      }
    }

    // Завершить сегмент (по кнопке «Далее» или по таймеру)
    function finishSegment() {
      stopTimer();
      try { recorder && recorder.state !== 'inactive' && recorder.stop(); } catch {}
      nextBtn.disabled = true; // защитимся от дабл-кликов
    }

    // Сохранение сегмента в sessionStorage
    function handleStop() {
      const blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
      const durationMs = Math.min(QUESTION_MS, performance.now() - qStartedAt);

      const fr = new FileReader();
      fr.onloadend = () => {
        try {
          const b64 = (fr.result || '').toString().split(',')[1] || '';
          const parts = JSON.parse(sessionStorage.getItem(PARTS_KEY) || '[]');
          parts[qIdx] = { mime: blob.type, b64, durationMs, qIdx };
          sessionStorage.setItem(PARTS_KEY, JSON.stringify(parts));

          // meta
          const meta = JSON.parse(sessionStorage.getItem(META_KEY) || '{}');
          meta.taskStartedAt ??= Date.now();
          meta[`q${qIdx+1}EndedAt`] = Date.now();
          sessionStorage.setItem(META_KEY, JSON.stringify(meta));
        } catch {}

        // Следующий вопрос или результат
        qIdx++;
        if (qIdx < QUESTIONS.length) {
          // подготовка следующего вопроса
          renderQuestion();
          nextBtn.disabled = false;
          timeEl.textContent = '00:20';
          barEl.style.width = '100%';
          startRecording();
        } else {
          // Переход на результат
          const NEXT_URL = location.pathname.replace(/_3_task\.html$/i, '_4_result.html');
          navigateOnce(NEXT_URL);
        }
      };
      fr.readAsDataURL(blob);
    }

    // Кнопка «Далее» — завершает текущий сегмент досрочно
    nextBtn.addEventListener('click', () => finishSegment());

    // Init
    (function init(){
      // Пометка, что мы перешли на task
      try {
        const meta = JSON.parse(sessionStorage.getItem(META_KEY) || '{}');
        meta.taskPageAt = Date.now();
        sessionStorage.setItem(META_KEY, JSON.stringify(meta));
        // если заход без шага mic, всё равно попробуем продолжить
      } catch {}

      renderQuestion();
      startRecording();
    })();

    // BFCache: снять замок
    window.addEventListener('pageshow', () => { navigateOnce.lock = false; });
  </script>
</body>
</html>
