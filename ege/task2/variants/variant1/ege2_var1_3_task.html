<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 2 — Questions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифты -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="../../../style_common.css" />

  <style>
    .q-layout{
      display:grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap:28px 36px;
      align-items:start;
      max-width:1500px;
      margin-inline:auto;
    }
    .q-left h2{ margin:0 0 10px; font-size:28px; line-height:1.2; }
    .q-left p{ font-size:22px; line-height:1.55; margin:0 0 10px; }

    .ad-title{ font-weight:800; font-size:30px; margin:6px 0 12px; text-align:center; }
    .ad-figure{ width:100%; aspect-ratio:3/2; border-radius:12px; overflow:hidden; box-shadow:var(--shadow); background:#ddd; }
    .ad-figure>img{ width:100%; height:100%; object-fit:cover; object-position:center; display:block; }

    .actions{ grid-column:1 / -1; text-align:center; margin-top:10px; margin-bottom:6px; }
    @media (max-width:1100px){ .q-layout{ grid-template-columns:1fr; gap:22px; } }

    /* Большой 3‑2‑1 */
    .timer{
      font-size:70px; margin:30px 0; font-weight:700;
      color:var(--primary); letter-spacing:4px; text-shadow:0 4px 12px rgba(0,0,0,.25);
      text-align:center;
    }

    /* Подсказка про звук */
    .tts-hint{
      position:fixed; left:50%; bottom:20px; transform:translateX(-50%);
      background:var(--card); color:var(--text); border:1px solid var(--border);
      border-radius:12px; padding:10px 14px; box-shadow:var(--shadow);
      font-size:14px; z-index:9999;
    }
  </style>

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try{
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      }catch(_){}
    })();
  </script>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <!-- Верх: только отсчёт -->
  <div class="content-wrapper" id="countdownWrap">
    <div id="timer" class="timer" aria-live="polite">3</div>
  </div>

  <!-- Основной блок как в эталоне -->
  <main class="page-center" id="mainWrap" style="display:none">
    <section class="card task-card">
      <div id="qWrap" class="q-layout">
        <!-- Слева — текст вопроса -->
        <section class="q-left" aria-live="polite">
          <h2 id="qTitle">Question 1.</h2>
          <p id="qLine">1) Ask a direct question about the following: <b>minimum age.</b></p>
        </section>

        <!-- Справа — заголовок над фото + фото -->
        <aside aria-label="Advertisement">
          <h3 class="ad-title">Join our bike club!</h3>
          <figure class="ad-figure">
            <img src="task2_bike.jpg" alt="Bike club advertisement image" loading="lazy">
          </figure>
        </aside>

        <!-- Кнопка -->
        <div class="actions">
          <button id="nextBtn" class="button" type="button">Далее</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Проставка, чтобы фикс‑бар не наезжал -->
  <div style="height: calc(var(--footer-h, 72px) + 24px);"></div>

  <!-- Фиксированный прогресс‑бар снизу -->
  <div id="progressContainerFixed" role="timer" aria-live="polite" style="display:none">
    <div id="progressBarFixed" class="rAF">
      <span id="progressTime" class="progress-time">00:20</span>
    </div>
  </div>

  <!-- ЛОГИКА -->
  <script type="module">
    import { toggleThemeInit, navigateOnce, fmtTime } from "../../../common.js";
    toggleThemeInit();

    // ===== Константы/маршруты =====
    const RESULT_URL = location.pathname.replace(/_3_task\.html$/i, '_4_result.html');
    const QUESTION_MS = 20_000;

    // ===== Хранилище: чистый старт и флаг «форс‑рестарт» от result =====
    const FORCE_KEY = 'ege2_force_restart';
    try{ sessionStorage.removeItem('ege2_audio_parts'); }catch{}
    const forceRestart = sessionStorage.getItem(FORCE_KEY) === '1';
    if (forceRestart) {
      try{ sessionStorage.removeItem(FORCE_KEY); }catch{}
    }

    // ===== Тексты вопросов =====
    const QUESTIONS = [
      { title: "Question 1.", line: "1) Ask a direct question about the following: <b>minimum age.</b>" },
      { title: "Question 2.", line: "2) Ask a direct question about the following: <b>special clothes.</b>" },
      { title: "Question 3.", line: "3) Ask a direct question about the following: <b>bicycle rental.</b>" },
      { title: "Question 4.", line: "4) Ask a direct question about the following: <b>competitions.</b>" }
    ];

    // ===== DOM =====
    const countdownWrap = document.getElementById('countdownWrap');
    const mainWrap = document.getElementById('mainWrap');

    const timerEl  = document.getElementById('timer');
    const qTitleEl = document.getElementById('qTitle');
    const qLineEl  = document.getElementById('qLine');
    const nextBtn  = document.getElementById('nextBtn');
    const barWrap  = document.getElementById('progressContainerFixed');
    const barEl    = document.getElementById('progressBarFixed');
    const timeEl   = document.getElementById('progressTime');

    // ===== Подсказка про звук (если TTS заблокирован) =====
    function showTtsHint(){
      if (document.querySelector('.tts-hint')) return;
      const el = document.createElement('div');
      el.className = 'tts-hint';
      el.textContent = '🔊 Нажмите на страницу, чтобы включить звук';
      document.body.appendChild(el);
      const remove = () => { el.remove(); window.removeEventListener('click', remove); window.removeEventListener('touchstart', remove); try{ speechSynthesis.resume(); }catch{} };
      window.addEventListener('click', remove, { passive:true });
      window.addEventListener('touchstart', remove, { passive:true });
    }

    // ===== Озвучка «Question N» =====
    async function speakQuestion(num){
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance("Question " + num);
        u.lang = "en-US"; u.rate = 1.0; u.pitch = 1.0;
        const said = await new Promise(res=>{
          let done=false; const to=setTimeout(()=>{ if(!done){done=true;res(false);} },1500);
          u.onend=()=>{ if(!done){done=true;clearTimeout(to);res(true);} };
          u.onerror=()=>{ if(!done){done=true;clearTimeout(to);res(false);} };
          try{ speechSynthesis.resume(); }catch{}
          speechSynthesis.speak(u);
        });
        if(!said) showTtsHint();
      }catch{}
    }

    // ===== Микрофон =====
    let streamRef=null, recorder=null, chunks=[];
    let chosenMime='';
    function pickMimeType(){
      const cands=['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/ogg'];
      for (const t of cands) if (window.MediaRecorder?.isTypeSupported?.(t)) return t;
      return '';
    }
    async function initMic(){
      try{
        streamRef = await navigator.mediaDevices.getUserMedia({ audio:true });
        chosenMime = pickMimeType();
        recorder = chosenMime ? new MediaRecorder(streamRef,{mimeType:chosenMime}) : new MediaRecorder(streamRef);
        recorder.ondataavailable = e => { if (e.data && e.data.size) chunks.push(e.data); };
        recorder.onstop = handleStop;
      }catch{ recorder=null; }
    }
    let micReadyPromise = initMic();

    // ===== Состояние таймера/вопросов =====
    let qIdx=0, startedAt=0, deadlineMs=0;
    let rafId=0, intId=0, hardTO=0, finishing=false;

    function renderQuestion(){
      const q=QUESTIONS[qIdx];
      qTitleEl.textContent=q.title;
      qLineEl.innerHTML=q.line;
    }

    // ===== Старт вопроса =====
    async function beginSegment(){
      // Озвучка
      await speakQuestion(qIdx+1);

      // Микрофон
      try{ await micReadyPromise; }catch{}
      chunks=[];
      try{ if(recorder && recorder.state!=='recording') recorder.start(); }catch{}

      // UI/дедлайн
      timeEl.textContent = fmtTime(QUESTION_MS);
      barEl.style.width = '100%';
      startedAt = performance.now();
      deadlineMs = startedAt + QUESTION_MS;
      finishing=false;

      stopClocks();
      tickRaf();
      intId = setInterval(tickWall, 250);
      hardTO = setTimeout(()=>{ if(!finishing) finishSegment(); }, QUESTION_MS + 1500);
    }

    function tickRaf(){
      const left = Math.max(0, deadlineMs - performance.now());
      barEl.style.width = (left/QUESTION_MS*100)+'%';
      if (!tickRaf._last || performance.now()-tickRaf._last>=250){
        timeEl.textContent = fmtTime(left);
        tickRaf._last = performance.now();
      }
      if (left<=0) finishSegment();
      else rafId = requestAnimationFrame(tickRaf);
    }
    function tickWall(){
      const left = deadlineMs - performance.now();
      if (left<=0) finishSegment();
      else timeEl.textContent = fmtTime(Math.max(0,left));
    }
    function stopClocks(){
      if (rafId){ cancelAnimationFrame(rafId); rafId=0; }
      if (intId){ clearInterval(intId); intId=0; }
      if (hardTO){ clearTimeout(hardTO); hardTO=0; }
    }

    // ===== Завершение сегмента =====
    function finishSegment(){
      if (finishing) return;
      finishing = true;
      stopClocks();
      nextBtn.disabled = true;

      try{
        if (recorder && recorder.state==='recording'){
          recorder.stop();  // после onstop → handleStop → proceedNext
          return;
        }
      }catch{}
      handleStop(); // если записывающего устройства нет
    }

    function handleStop(){ proceedNext(); }

    function proceedNext(){
      qIdx++;
      if (qIdx < QUESTIONS.length){
        renderQuestion();
        nextBtn.disabled = false;
        beginSegment();
      }else{
        try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
        navigateOnce(RESULT_URL);
      }
    }

    // Кнопка «Далее»
    nextBtn.addEventListener('click', finishSegment);

    // Если вернулись на вкладку и дедлайн прошёл — добиваем сегмент
    document.addEventListener('visibilitychange', ()=>{
      if (document.visibilityState==='visible' && !finishing){
        if (performance.now() >= deadlineMs) finishSegment();
      }
    });

    // ===== Отсчёт 3‑2‑1 и переход к карточке =====
    function showCard(){
      countdownWrap.style.display = 'none';
      mainWrap.style.display = 'block';
      barWrap.style.display = 'block';
      qIdx = 0;
      renderQuestion();
      beginSegment();
    }
    function startCountdown(){
      let n = 3;
      timerEl.textContent = n;
      const id = setInterval(()=>{
        timerEl.textContent = n;
        n--;
        if (n < 0){
          clearInterval(id);
          showCard();
        }
      }, 1000);
    }

    // ===== Инициализация/рестарт =====
    function freshStart(){
      // сброс UI
      countdownWrap.style.display = 'block';
      mainWrap.style.display = 'none';
      barWrap.style.display = 'none';
      nextBtn.disabled = false;

      // перезапуск микрофона (на случай BFCache)
      micReadyPromise = initMic();

      // старт отсчёта
      startCountdown();
    }

    // Первичный запуск
    freshStart();

    // Если вернулись Back/Forward (BFCache) — всегда начинаем заново
    function isBackForwardNav(){
      try{
        const nav = performance.getEntriesByType('navigation')[0];
        return nav && nav.type === 'back_forward';
      }catch{ return false; }
    }
    window.addEventListener('pageshow', (e)=>{
      // снимаем замок навигации
      navigateOnce.lock = false;

      if (e.persisted || isBackForwardNav() || forceRestart){
        freshStart();
      }
    });

    // Очистка ресурсов
    window.addEventListener('beforeunload', ()=>{
      try{ stopClocks(); }catch{}
      try{ if (recorder && recorder.state==='recording') recorder.stop(); }catch{}
      try{ streamRef?.getTracks()?.forEach(t=>t.stop()); }catch{}
    });
  </script>
</body>
</html>
