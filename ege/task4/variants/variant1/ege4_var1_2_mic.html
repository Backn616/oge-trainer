<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Предупреждение — доступ к микрофону</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="style_common.css">
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <main class="page-center">
    <section class="card" role="dialog" aria-labelledby="warnTitle" aria-describedby="warnText">
      <h1 id="warnTitle">Внимание</h1>
      <p id="warnText">
        На следующем этапе тренажёр попытается получить доступ к микрофону.<br><br>
        Браузер покажет системный запрос на использование микрофона.<br><br>
        Если вы готовы выполнить устную часть задания 4, пожалуйста,<br>
        <strong>разрешите сайту использовать микрофон</strong>, чтобы начать запись ответа.
      </p>

      <!-- Ставим href, и всё равно дублируем переход через JS с защитой -->
      <a id="nextLink"
         class="button"
         href="#"
         role="button"
         aria-label="Перейти к заданию с запросом доступа к микрофону">
        ОК
      </a>
    </section>
  </main>

  <!-- Скрипт -->
  <script type="module">
    import { toggleThemeInit, navigateOnce } from './common.js';

    toggleThemeInit();

    // Подготовка sessionStorage
    try {
      sessionStorage.removeItem('ege4_audio_base64'); // очистка старой записи
      sessionStorage.setItem('ege4_warned','1');
      const meta = JSON.parse(sessionStorage.getItem('ege4_meta') || '{}');
      meta.warnedAt = Date.now();
      sessionStorage.setItem('ege4_meta', JSON.stringify(meta));
    } catch {}

    // Навигация
    const NEXT_URL = location.pathname.replace(/_2_mic\.html$/i, '_3_task.html');

    const a = document.getElementById('nextLink');
    a.href = NEXT_URL;
    a.addEventListener('click', (e) => {
      e.preventDefault();
      navigateOnce(NEXT_URL);
    });

    // fallback-навигация при уходе со страницы
    document.addEventListener('visibilitychange', () => { if (document.hidden) navigateOnce(NEXT_URL); });
    window.addEventListener('pagehide', () => navigateOnce(NEXT_URL));
    window.addEventListener('freeze', () => navigateOnce(NEXT_URL));
  </script>
</body>
</html>
