<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Предупреждение — доступ к микрофону</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#f7f9ff; --card:#ffffff; --text:#0b1020;
      --primary:#2b6cff; --primary-600:#1f58d9; --danger:#b30000;
      --shadow:0 10px 25px rgba(17,24,39,.08); --ring:#bfd3ff;
      --focus:0 0 0 4px var(--ring);
    }
    .dark{
      --bg:#0b1020; --card:rgba(255,255,255,.08); --text:#eaf0ff;
      --primary:#6aa3ff; --primary-600:#4b8dff; --danger:#ff6b6b;
      --shadow:0 10px 35px rgba(0,0,0,.35); --ring:#a9c6ff;
    }

    *{ box-sizing:border-box }
    html{ height:100%; }
    body{
      font-family:'Roboto',system-ui,sans-serif;
      margin:0; padding:40px 20px;
      background:
        radial-gradient(1200px 600px at 70% -10%, #29417a40, transparent),
        radial-gradient(900px 500px at -10% 10%, #344b9340, transparent),
        var(--bg);
      color:var(--text);
      display:flex; justify-content:center; align-items:center;
      min-height:100svh; /* стабильнее на мобилках */
    }
    :focus-visible{ outline:none; box-shadow:var(--focus) }

    .card{
      background:var(--card);
      border-radius:16px;
      padding:40px;
      max-width:800px; width:100%;
      box-shadow:var(--shadow);
      text-align:center;
    }
    h1{ font-size:32px; color:var(--danger); margin:0 0 16px; }
    p{ font-size:20px; line-height:1.6; margin:0 0 28px; }

    .button{
      display:inline-block;
      padding:16px 32px;
      font-size:20px; font-weight:600;
      color:#fff; text-decoration:none;
      background:linear-gradient(135deg, var(--primary), var(--primary-600));
      border:none; border-radius:12px; cursor:pointer;
      box-shadow:0 10px 22px rgba(43,108,255,.3);
      transition:transform .06s ease, box-shadow .2s ease, filter .2s ease;
    }
    .button:hover{ transform:translateY(-1px); filter:brightness(1.03); }

    .theme-toggle{
      position:fixed; top:16px; right:16px; z-index:10000;
      border:1px solid #ffffff22; background:transparent; color:var(--text);
      padding:10px 14px; border-radius:10px; cursor:pointer; backdrop-filter: blur(6px);
      transition:transform .08s ease, filter .2s ease;
    }
    .theme-toggle:hover{ transform:translateY(-1px); filter:brightness(1.03); }
  </style>
</head>
<body>
  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <main class="card" role="dialog" aria-labelledby="warnTitle" aria-describedby="warnText">
    <h1 id="warnTitle">Внимание</h1>
    <p id="warnText">
      На следующем этапе тренажёр попытается получить доступ к микрофону.<br><br>
      Браузер покажет системный запрос на использование микрофона.<br><br>
      Если вы готовы выполнить устную часть задания 4, пожалуйста,<br>
      <strong>разрешите сайту использовать микрофон</strong>, чтобы начать запись ответа.
    </p>

    <!-- Ставим href, и всё равно дублируем переход через JS с защитой -->
    <a id="nextLink"
       class="button"
       href="#"
       role="button"
       aria-label="Перейти к заданию с запросом доступа к микрофону">
      ОК
    </a>
  </main>

  <!-- Скрипт -->
  <script type="module">
    import { toggleThemeInit, navigateOnce } from '../../../common.js';

    toggleThemeInit();

    // Подготовка sessionStorage для Task 4
    try{
      sessionStorage.removeItem('ege4_audio_base64'); // очистка возможной старой записи
      sessionStorage.setItem('ege4_warned','1');      // маркер показа предупреждения
      const meta = JSON.parse(sessionStorage.getItem('ege4_meta') || '{}');
      meta.warnedAt = Date.now();
      sessionStorage.setItem('ege4_meta', JSON.stringify(meta));
    }catch{}

    // Навигация
    const NEXT_URL = location.pathname.replace(/_2_mic\.html$/i, '_3_task.html');

    // Ставим href (fallback без JS) и защищённый переход
    const a = document.getElementById('nextLink');
    a.href = NEXT_URL;
    a.addEventListener('click', (e) => {
      e.preventDefault();
      navigateOnce(NEXT_URL);
    });

    // Страховки: если вкладку сворачивают/уходят — двигаемся дальше
    document.addEventListener('visibilitychange', () => { if (document.hidden) navigateOnce(NEXT_URL); });
    window.addEventListener('pagehide', () => navigateOnce(NEXT_URL));
    window.addEventListener('freeze', () => navigateOnce(NEXT_URL));
  </script>
</body>
</html>
