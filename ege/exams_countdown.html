<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Экзамен полностью — переход к следующему заданию</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style_common.css" />

  <script>
    (function(){ try{
      const saved = localStorage.getItem('pref-theme') || 'light';
      if (saved === 'dark') document.documentElement.classList.add('dark');
    }catch{}})();
  </script>

  <style>
    .wrap{ max-width:1100px; margin:0 auto; padding:40px 20px; text-align:center; }
    .title{ font-size:28px; font-weight:800; margin:0 0 10px; }
    .sub{ font-size:18px; color:var(--muted); margin:0 0 20px; }
    .timer{
      font-size:80px; font-weight:800; color:var(--primary);
      text-shadow:0 4px 12px rgba(0,0,0,.25); margin:30px 0;
    }
    .btns{ margin-top:16px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  </style>
</head>
<body>
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <div class="wrap">
    <div id="title" class="title">Следующее задание</div>
    <div id="sub" class="sub">Готовимся…</div>
    <div id="timer" class="timer" aria-live="polite">3</div>
    <div class="btns">
      <button id="skipBtn" class="button" type="button">Пропустить отсчёт</button>
      <a id="toMenu" class="button" role="button" href="./ege_menu.html">К выбору задания</a>
    </div>
  </div>

  <script type="module">
    import { toggleThemeInit, navigateOnce } from './common.js';
    toggleThemeInit();

    const params   = new URLSearchParams(location.search);
    const next     = Number(params.get('next') || '2'); // 2..4
    const variantQ = params.get('variant');
    const variantS = sessionStorage.getItem('exam_variant') || '';
    const variant  = variantQ || variantS || '1';

    // Заголовки/подписи
    const mapTitle = {2:'Task 2', 3:'Task 3', 4:'Task 4'};
    document.getElementById('title').textContent = `Дальше: ${mapTitle[next] || 'Следующее задание'}`;
    document.getElementById('sub').textContent   = `Вариант ${variant} · начнём с подготовки (prepare)`;

    // Куда идти после отсчёта
    function nextPrepareUrl(){
      // /ege/taskX/variants/variantN/egeX_varN_1_prepare.html
      return `./task${next}/variants/variant${variant}/ege${next}_var${variant}_1_prepare.html`
        .replace(/\/{2,}/g,'/').replace(':/','://');
    }

    // Сам отсчёт
    const timerEl = document.getElementById('timer');
    let n = 3;
    timerEl.textContent = n;
    const id = setInterval(()=>{
      timerEl.textContent = n;
      n--;
      if (n < 0){
        clearInterval(id);
        navigateOnce(nextPrepareUrl());
      }
    },1000);

    // Пропуск
    document.getElementById('skipBtn').addEventListener('click', ()=>{
      clearInterval(id);
      navigateOnce(nextPrepareUrl());
    });

    // Снять «замок» навигатора при возврате
    window.addEventListener('pageshow', ()=>{ navigateOnce.lock = false; });
  </script>
</body>
</html>
