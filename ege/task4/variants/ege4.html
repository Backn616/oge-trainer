<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЕГЭ — Задание 4: выбор варианта</title>
  <meta name="description" content="Выбор варианта для задания 4 устной части ЕГЭ. Запись ответа и прослушивание." />

  <!-- Шрифты + preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Анти-мигание темы -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>

  <style>
    :root {
      --bg:#f7f9ff; --card:#fff; --text:#0b1020; --muted:#5a6475;
      --primary:#2b6cff; --primary-600:#1f58d9; --ring:#bfd3ff;
      --success:#25c26e; --shadow:0 10px 25px rgba(17,24,39,.08);
      --btn-1:#6d95ff; --btn-2:#4f7dff; --btn-text:#fff;
      --radius-xl:20px; --grid-gap:40px;
      --btn-fs:20px; --btn-pad-y:18px; --btn-pad-x:24px; --btn-minh:56px; --btn-radius:14px;
    }
    .dark{
      --bg:#0b1020; --card:rgba(255,255,255,.08); --text:#eaf0ff; --muted:#b9c2d3;
      --primary:#6aa3ff; --primary-600:#4b8dff; --ring:#a9c6ff;
      --success:#5ee397; --shadow:0 10px 35px rgba(0,0,0,.35);
      --btn-1:#aecdff; --btn-2:#86b8ff; --btn-text:#fff;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif; color:var(--text);
      background:
        radial-gradient(1200px 600px at 70% -10%, #29417a40, transparent),
        radial-gradient(900px 500px at -10% 10%, #344b9340, transparent),
        var(--bg);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1040px; margin:0 auto; padding:24px}

    header{display:flex; justify-content:space-between; align-items:center; gap:16px; padding:8px 0;}
    .brand{display:flex; align-items:center; gap:12px}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(135deg, var(--primary), #9bd0ff);
      box-shadow: 0 6px 18px rgba(0,0,0,.25), inset 0 0 12px #ffffff33;
      display:grid; place-items:center; color:#001133; font-weight:800;
    }
    .brand-title{font-weight:700; letter-spacing:.2px}
    .badge{font-size:12px; color:var(--muted)}
    .theme-toggle{
      border:1px solid #ffffff22; background:transparent; color:var(--text);
      padding:10px 14px; border-radius:10px; cursor:pointer; transition:transform .08s ease;
    }
    .theme-toggle:active{transform:scale(.98)}
    .theme-toggle:focus-visible{ box-shadow:0 0 0 4px var(--ring); outline:none; }

    main{padding:40px 0 24px}
    .card{
      background:var(--card); border:1px solid #ffffff1f; border-radius: var(--radius-xl);
      padding:28px; box-shadow:var(--shadow); backdrop-filter: blur(10px);
    }
    .h1{font-size:clamp(26px,5vw,36px); line-height:1.15; margin:0 0 10px}
    .sub{color:var(--muted); font-size:16px; margin:0 0 18px}

    .frame{
      border:1px solid #ffffff22; border-radius: calc(var(--radius-xl) - 2px);
      background:#ffffff06; backdrop-filter: blur(6px);
      padding:22px; margin-top:12px;
    }

    /* 3 → 2 → 1 колонки */
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(220px,1fr));
      gap: var(--grid-gap);
    }
    @media (max-width:900px){
      .grid{ grid-template-columns: repeat(2, minmax(220px,1fr)); }
    }
    @media (max-width:580px){
      .grid{ grid-template-columns: 1fr; }
    }

    .variant{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      font-size: var(--btn-fs); font-weight:600; padding: var(--btn-pad-y) var(--btn-pad-x);
      min-height: var(--btn-minh); border-radius: var(--btn-radius);
      border:1px solid rgba(255,255,255,.18);
      background: linear-gradient(135deg, var(--btn-1), var(--btn-2));
      color: var(--btn-text); text-shadow: 0 1px 0 rgba(0,0,0,.15);
      box-shadow: 0 12px 24px rgba(75,141,255,.28);
      transition: transform .06s ease, filter .2s ease, box-shadow .2s ease; cursor: pointer;
    }
    .variant:hover{ transform: translateY(-2px); filter: brightness(1.03) }
    .variant:focus-visible{ box-shadow: 0 0 0 4px var(--ring); outline: none; }

    .pager{ display:flex; align-items:center; justify-content:center; gap:12px; margin-top:20px; }
    .pager-btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:10px; border:1px solid #ffffff22;
      background: var(--card); color: var(--text); cursor:pointer; box-shadow: var(--shadow);
      transition: transform .06s ease, filter .2s ease;
    }
    .pager-btn[disabled]{opacity:.6; cursor:not-allowed}
    .pager-btn:hover:not([disabled]){ transform: translateY(-1px); filter: brightness(1.02) }
    .pager-info{ color: var(--muted); font-size:14px }

    footer{padding:26px 0 10px; color:var(--muted); font-size:13px; text-align:center}

    .visually-hidden{
      position:absolute !important; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
    }

    /* noscript фолбэк, чтобы варианты были видны без JS */
    noscript .grid a{
      display:inline-flex; align-items:center; justify-content:center;
      padding: var(--btn-pad-y) var(--btn-pad-x); min-height: var(--btn-minh);
      border-radius: var(--btn-radius); background: linear-gradient(135deg, var(--btn-1), var(--btn-2));
      color:var(--btn-text); text-decoration:none; font-weight:600;
      box-shadow: 0 12px 24px rgba(75,141,255,.28);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand back-to-menu" href="#" aria-label="Назад к списку заданий">
        <div class="logo">A</div>
        <div>
          <div class="brand-title">Онлайн-тренажёр «Говорение»</div>
          <div class="badge">ЕГЭ · задание 4</div>
        </div>
      </a>
      <div style="display:flex; gap:10px; align-items:center">
        <a class="back-to-menu" href="#" aria-label="К выбору задания">← К выбору задания</a>
        <button class="theme-toggle" id="themeBtn" aria-label="Переключить тему">🌓 Тема</button>
      </div>
    </header>

    <main>
      <section class="card">
        <h1 class="h1">ЕГЭ — задание 4: выбери вариант</h1>
        <p class="sub">Нажми на вариант, затем запиши и прослушай свой ответ.</p>

        <div class="frame">
          <nav id="variants" class="grid" aria-label="Варианты задания 4"></nav>

          <div class="pager" aria-label="Пагинация вариантов">
            <button id="prevBtn" class="pager-btn" type="button" aria-label="← Назад" aria-controls="variants">← Назад</button>
            <div id="pagerInfo" class="pager-info" aria-live="polite"></div>
            <button id="nextBtn" class="pager-btn" type="button" aria-label="Вперёд →" aria-controls="variants">Вперёд →</button>
            <span id="currentPageMarker" class="visually-hidden" aria-current="page">Страница 1</span>
          </div>
        </div>

        <!-- noscript fallback: 1 страница с 15 ссылками -->
        <noscript>
          <div class="frame">
            <nav class="grid" aria-label="Варианты (без JS)">
              <a href="./variant1/ege4_var1_1_prepare.html">Вариант 1</a>
              <a href="./variant2/ege4_var2_1_prepare.html">Вариант 2</a>
              <a href="./variant3/ege4_var3_1_prepare.html">Вариант 3</a>
              <a href="./variant4/ege4_var4_1_prepare.html">Вариант 4</a>
              <a href="./variant5/ege4_var5_1_prepare.html">Вариант 5</a>
              <a href="./variant6/ege4_var6_1_prepare.html">Вариант 6</a>
              <a href="./variant7/ege4_var7_1_prepare.html">Вариант 7</a>
              <a href="./variant8/ege4_var8_1_prepare.html">Вариант 8</a>
              <a href="./variant9/ege4_var9_1_prepare.html">Вариант 9</a>
              <a href="./variant10/ege4_var10_1_prepare.html">Вариант 10</a>
              <a href="./variant11/ege4_var11_1_prepare.html">Вариант 11</a>
              <a href="./variant12/ege4_var12_1_prepare.html">Вариант 12</a>
              <a href="./variant13/ege4_var13_1_prepare.html">Вариант 13</a>
              <a href="./variant14/ege4_var14_1_prepare.html">Вариант 14</a>
              <a href="./variant15/ege4_var15_1_prepare.html">Вариант 15</a>
            </nav>
          </div>
        </noscript>
      </section>
    </main>

    <footer>© 2025 — Демо‑версия тренажёра ЕГЭ.</footer>
  </div>

  <!-- НЕ модульный скрипт с безопасным динамическим импортом -->
  <script>
    (async function(){
      // Фолбэки на случай, если common.js недоступен
      let navigateOnce = (url) => { location.href = url; };
      let toggleThemeInit = () => {
        const key = 'pref-theme';
        const btn = document.getElementById('themeBtn');
        const apply = (mode)=> {
          document.documentElement.classList.toggle('dark', mode === 'dark');
          try { localStorage.setItem(key, mode); } catch {}
        };
        apply((() => { try { return localStorage.getItem(key) || 'light'; } catch { return 'light'; } })());
        btn?.addEventListener('click', () => {
          const mode = (()=>{
            try { return localStorage.getItem(key) || 'light'; } catch { return 'light'; }
          })();
          apply(mode === 'dark' ? 'light' : 'dark');
        });
      };

      // Вычисляем /ege/ и пробуем импортировать общий модуль
      const parts = location.pathname.split('/').filter(Boolean);
      const idx = parts.indexOf('ege');
      const egeBase = (idx !== -1) ? ('/' + parts.slice(0, idx + 1).join('/') + '/') : '/ege/';
      const commonUrl = (egeBase + 'common.js').replace(/\/{2,}/g, '/');

      try {
        const mod = await import(commonUrl);
        if (typeof mod.navigateOnce === 'function') navigateOnce = mod.navigateOnce;
        if (typeof mod.toggleThemeInit === 'function') toggleThemeInit = mod.toggleThemeInit;
      } catch (e) {
        console.warn('Не удалось импортировать common.js:', commonUrl, e);
      }

      // Инициализируем тему в любом случае
      try { toggleThemeInit(); } catch {}

      // «Назад к меню»
      document.querySelectorAll('.back-to-menu').forEach(a => {
        const url = egeBase + 'ege_menu.html';
        a.href = url;
        a.addEventListener('click', (e) => { e.preventDefault(); navigateOnce(url); });
      });

      // Рендер вариантов + пагинация
      const VARIANTS_BASE = location.pathname.replace(/ege4\.html$/i, '');
      const TOTAL_VARIANTS = 60;
      const PAGE_SIZE      = 15;

      const variantsEl    = document.getElementById('variants');
      const prevBtn       = document.getElementById('prevBtn');
      const nextBtn       = document.getElementById('nextBtn');
      const pagerInfo     = document.getElementById('pagerInfo');
      const currentMarker = document.getElementById('currentPageMarker');

      let currentPage = 1;
      const totalPages = Math.ceil(TOTAL_VARIANTS / PAGE_SIZE);

      function renderPage(page){
        currentPage = Math.min(Math.max(1, page), totalPages);
        variantsEl.innerHTML = '';

        const start = (currentPage - 1) * PAGE_SIZE + 1;
        const end   = Math.min(TOTAL_VARIANTS, start + PAGE_SIZE - 1);

        const frag = document.createDocumentFragment();
        for(let n = start; n <= end; n++){
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'variant';
          btn.textContent = `Вариант ${n}`;
          btn.setAttribute('aria-label', `Перейти к варианту ${n}`);
          btn.addEventListener('click', () => {
            const url = `${VARIANTS_BASE}variant${n}/ege4_var${n}_1_prepare.html`
              .replace(/\/{2,}/g, '/').replace(':/', '://');
            navigateOnce(url);
          });
          frag.appendChild(btn);
        }
        variantsEl.appendChild(frag);

        pagerInfo.textContent = `Стр. ${currentPage} из ${totalPages} · ${start}–${end} из ${TOTAL_VARIANTS}`;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
        prevBtn.setAttribute('aria-disabled', String(prevBtn.disabled));
        nextBtn.setAttribute('aria-disabled', String(nextBtn.disabled));
        currentMarker.textContent = `Страница ${currentPage}`;
      }

      prevBtn.addEventListener('click', () => renderPage(currentPage - 1));
      nextBtn.addEventListener('click', () => renderPage(currentPage + 1));

      renderPage(1);

      // BFCache: снять замок (если navigateOnce есть)
      try { window.addEventListener('pageshow', () => { navigateOnce.lock = false; }); } catch {}
    })();
  </script>
</body>
</html>
