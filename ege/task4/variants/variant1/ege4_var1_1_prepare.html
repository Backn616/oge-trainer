<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Task 4 — Preparation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Шрифт -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

  <!-- Подключаем общий стиль -->
  <link rel="stylesheet" href="../../style_common.css">

  <!-- Анти-мигание темы -->
  <script>
    (function(){
      try {
        const saved = localStorage.getItem('pref-theme') || 'light';
        if(saved === 'dark') document.documentElement.classList.add('dark');
      } catch(_) {}
    })();
  </script>
</head>
<body>

  <!-- Тумблер темы -->
  <button id="themeBtn" class="theme-toggle" aria-label="Переключить тему">🌓 Тема</button>

  <div class="content-wrapper">
    <div class="task-container">
      <p><strong>Task 4.</strong> You are going to give a talk about …</p>
      <p class="instruction">In 2.5 minutes be ready to:</p>
      <ul>
        <li>talk about …</li>
        <li>say what …</li>
        <li>explain why …</li>
      </ul>
    </div>

    <div style="text-align:center; margin-bottom:30px;">
      <button id="goBtn" class="button">Перейти к выполнению</button>
    </div>
  </div>

  <!-- Прогресс-бар -->
  <div id="progressContainerFixed" role="timer" aria-live="polite">
    <div id="progressBarFixed">
      <span id="progressTime" class="progress-time">02:30</span>
    </div>
  </div>

  <script type="module">
    import { toggleThemeInit, fmtTime, navigateOnce } from "../../common.js";

    toggleThemeInit();

    const progressBar = document.getElementById("progressBarFixed");
    const progressTime = document.getElementById("progressTime");
    const NEXT_URL = location.pathname.replace(/_1_prepare\.html$/i, "_2_mic.html");

    const totalMs = 150_000; // 2.5 минуты
    const endTime = Date.now() + totalMs;

    function tick(){
      const left = Math.max(0, endTime - Date.now());
      progressTime.textContent = fmtTime(left);
      progressBar.style.width = `${(left / totalMs) * 100}%`;
      if(left <= 0) navigateOnce(NEXT_URL);
    }
    tick();
    const timerId = setInterval(tick, 500);

    document.getElementById("goBtn").addEventListener("click", ()=> navigateOnce(NEXT_URL));
    window.addEventListener("beforeunload", ()=> clearInterval(timerId));
  </script>
</body>
</html>
