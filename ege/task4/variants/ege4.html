<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЕГЭ — Задание 4: выбор варианта</title>
  <meta name="description" content="Выбор варианта для задания 4 устной части ЕГЭ. Запись ответа и прослушивание." />

  <!-- Шрифты (как в пробном файле) + оба preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Анти-мигание темы -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>

  <style>
    :root {
      --bg: #f7f9ff;
      --card: #ffffff;
      --text: #0b1020;
      --muted:#5a6475;
      --primary:#2b6cff;
      --primary-600:#1f58d9;
      --ring:#bfd3ff;
      --success:#25c26e;
      --shadow: 0 10px 25px rgba(17,24,39,.08);
      --btn-1:#6d95ff;
      --btn-2:#4f7dff;
      --btn-text:#ffffff;
      --radius-xl:20px;
      --grid-gap:40px;
      --btn-fs:20px;
      --btn-pad-y:18px;
      --btn-pad-x:24px;
      --btn-minh:56px;
      --btn-radius:14px;
    }
    .dark {
      --bg: #0b1020;
      --card: rgba(255,255,255,0.08);
      --text: #eaf0ff;
      --muted: #b9c2d3;
      --primary: #6aa3ff;
      --primary-600: #4b8dff;
      --ring: #a9c6ff;
      --success: #5ee397;
      --shadow: 0 10px 35px rgba(0,0,0,.35);
      --btn-1:#aecdff;
      --btn-2:#86b8ff;
      --btn-text:#ffffff;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 70% -10%, #29417a40, transparent),
        radial-gradient(900px 500px at -10% 10%, #344b9340, transparent),
        var(--bg);
    }
    a{color:inherit; text-decoration:none}
    .wrap{max-width:1040px; margin:0 auto; padding:24px}

    header{display:flex; justify-content:space-between; align-items:center; gap:16px; padding:8px 0;}
    .brand{display:flex; align-items:center; gap:12px}
    .logo{
      width:42px; height:42px; border-radius:12px;
      background: linear-gradient(135deg, var(--primary), #9bd0ff);
      box-shadow: 0 6px 18px rgba(0,0,0,.25), inset 0 0 12px #ffffff33;
      display:grid; place-items:center; color:#001133; font-weight:800;
    }
    .brand-title{font-weight:700; letter-spacing:.2px}
    .badge{font-size:12px; color:var(--muted)}
    .theme-toggle{
      border:1px solid #ffffff22; background:transparent; color:var(--text);
      padding:10px 14px; border-radius:10px; cursor:pointer; transition:transform .08s ease;
    }
    .theme-toggle:active{transform:scale(.98)}

    main{padding:40px 0 24px}
    .card{
      background:var(--card);
      border:1px solid #ffffff1f;
      border-radius: var(--radius-xl);
      padding:28px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(10px);
    }
    .h1{font-size:clamp(26px,5vw,36px); line-height:1.15; margin:0 0 10px}
    .sub{color:var(--muted); font-size:16px; margin:0 0 18px}

    .frame{
      border:1px solid #ffffff22;
      border-radius: calc(var(--radius-xl) - 2px);
      background:#ffffff06;
      backdrop-filter: blur(6px);
      padding:22px;
      margin-top:12px;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
      gap: var(--grid-gap);
    }
    .variant{
      display:inline-flex; align-items:center; justify-content:center; gap:10px;
      font-size: var(--btn-fs); font-weight:600;
      padding: var(--btn-pad-y) var(--btn-pad-x);
      min-height: var(--btn-minh);
      border-radius: var(--btn-radius);
      border:1px solid rgba(255,255,255,.18);
      background: linear-gradient(135deg, var(--btn-1), var(--btn-2));
      color: var(--btn-text);
      text-shadow: 0 1px 0 rgba(0,0,0,.15);
      box-shadow: 0 12px 24px rgba(75,141,255,.28);
      transition: transform .06s ease, filter .2s ease, box-shadow .2s ease;
      cursor: pointer;
    }
    .variant:hover{ transform: translateY(-2px); filter: brightness(1.03) }
    .variant:focus-visible{ box-shadow: 0 0 0 4px var(--ring); outline: none; }

    .pager{
      display:flex; align-items:center; justify-content:center; gap:12px;
      margin-top:20px;
    }
    .pager-btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding:10px 14px; border-radius:10px; border:1px solid #ffffff22;
      background: var(--card); color: var(--text); cursor:pointer;
      box-shadow: var(--shadow);
      transition: transform .06s ease, filter .2s ease;
    }
    .pager-btn[disabled]{opacity:.6; cursor:not-allowed}
    .pager-btn:hover:not([disabled]){ transform: translateY(-1px); filter: brightness(1.02) }
    .pager-info{ color: var(--muted); font-size:14px }

    footer{padding:26px 0 10px; color:var(--muted); font-size:13px; text-align:center}
    .back{border:1px dashed #ffffff28; padding:10px 14px; border-radius:10px}

    /* Визуально скрытый элемент для a11y */
    .visually-hidden{
      position:absolute !important;
      width:1px; height:1px;
      padding:0; margin:-1px;
      overflow:hidden; clip:rect(0 0 0 0); white-space:nowrap; border:0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand back-to-menu" href="#" aria-label="Назад к списку заданий">
        <div class="logo">A</div>
        <div>
          <div class="brand-title">Онлайн-тренажёр «Говорение»</div>
          <div class="badge">ЕГЭ · задание 4</div>
        </div>
      </a>
      <div style="display:flex; gap:10px; align-items:center">
        <a class="back back-to-menu" href="#">← К выбору задания</a>
        <button class="theme-toggle" id="themeBtn" aria-label="Переключить тему">🌓 Тема</button>
      </div>
    </header>

    <main>
      <section class="card">
        <h1 class="h1">ЕГЭ — задание 4: выбери вариант</h1>
        <p class="sub">Нажми на вариант, затем запиши и прослушай свой ответ.</p>

        <div class="frame">
          <nav id="variants" class="grid" aria-label="Варианты задания 4"></nav>

          <div class="pager" aria-label="Пагинация вариантов">
            <button id="prevBtn" class="pager-btn" type="button" aria-label="← Назад">← Назад</button>
            <div id="pagerInfo" class="pager-info" aria-live="polite"></div>
            <button id="nextBtn" class="pager-btn" type="button" aria-label="Вперёд →">Вперёд →</button>
            <!-- Маркер текущей страницы для screen reader -->
            <span id="currentPageMarker" class="visually-hidden" aria-current="page">Страница 1</span>
          </div>
        </div>
      </section>
    </main>

    <footer>© 2025 — Демо-версия тренажёра ЕГЭ.</footer>
  </div>

  <script type="module">
    import { toggleThemeInit, navigateOnce } from './common.js';

    // Тема (общая инициализация)
    toggleThemeInit();

    // Надёжная база /.../ege/
    function getEgeBase() {
      const parts = location.pathname.split('/').filter(Boolean);
      const i = parts.indexOf('ege');
      let base = (i !== -1) ? ('/' + parts.slice(0, i + 1).join('/') + '/') : '/ege/';
      return base.replace(/\/{2,}/g, '/');
    }
    const EGE_BASE = getEgeBase();

    // Привязываем «к выбору задания»
    document.querySelectorAll('.back-to-menu').forEach(a => {
      a.href = EGE_BASE + 'ege_menu.html';
    });

    // Пагинация
    const TOTAL_VARIANTS = 60;
    const PAGE_SIZE      = 15;

    const variantsEl = document.getElementById('variants');
    const prevBtn    = document.getElementById('prevBtn');
    const nextBtn    = document.getElementById('nextBtn');
    const pagerInfo  = document.getElementById('pagerInfo');
    const currentMarker = document.getElementById('currentPageMarker');

    let currentPage = 1;
    const totalPages = Math.ceil(TOTAL_VARIANTS / PAGE_SIZE);

    function renderPage(page){
      currentPage = Math.min(Math.max(1, page), totalPages);
      variantsEl.innerHTML = '';
      const start = (currentPage - 1) * PAGE_SIZE + 1;
      const end   = Math.min(TOTAL_VARIANTS, start + PAGE_SIZE - 1);

      const frag = document.createDocumentFragment();
      for(let n = start; n <= end; n++){
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'variant';
        btn.textContent = `Вариант ${n}`;
        btn.setAttribute('aria-label', `Перейти к варианту ${n}`);
        btn.addEventListener('click', () => goToVariant(n));
        frag.appendChild(btn);
      }
      variantsEl.appendChild(frag);

      pagerInfo.textContent = `Стр. ${currentPage} из ${totalPages} · ${start}–${end} из ${TOTAL_VARIANTS}`;
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;

      // Обновляем aria-current «Страница X»
      currentMarker.textContent = `Страница ${currentPage}`;
      // (aria-current="page" уже стоит на элементе)
    }

    function goToVariant(n){
      const url = `${EGE_BASE}task4/variants/variant${n}/ege4_var${n}_1_prepare.html`
        .replace(/\/{2,}/g, '/')
        .replace(':/', '://');
      navigateOnce(url);
    }

    prevBtn.addEventListener('click', () => renderPage(currentPage - 1));
    nextBtn.addEventListener('click', () => renderPage(currentPage + 1));

    // Первый рендер
    renderPage(1);

    // Снять замок при возврате из BFCache
    window.addEventListener('pageshow', () => { navigateOnce.lock = false; });
  </script>
</body>
</html>
