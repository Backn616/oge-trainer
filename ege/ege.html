<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ЕГЭ — Начало</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Общие стили -->
  <link rel="stylesheet" href="../style_common.css" />

  <!-- Анти-мигание темы -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('pref-theme') || 'light';
        if (saved === 'dark') document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>

  <style>
    main{flex:1; display:flex; justify-content:center; align-items:center}
    .card{
      max-width:500px; width:100%; text-align:center;
      padding:40px;
    }
    h1{font-size:clamp(26px,5vw,36px); margin-bottom:32px}
    .btn{width:100%; margin-bottom:20px; font-size:22px; min-height:64px}
    .btn:last-child{margin-bottom:0}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="../index.html" aria-label="На главную">
        <div class="logo">A</div>
        <div>
          <div class="brand-title">Онлайн-тренажёр «Говорение»</div>
          <div class="badge">ЕГЭ по английскому</div>
        </div>
      </a>
      <button class="theme-toggle" id="themeBtn" aria-label="Переключить тему">🌓 Тема</button>
    </header>

    <main>
      <div class="card">
        <h1>📝 Выберите формат тренировки</h1>
        <a href="ege_full.html" class="btn">Экзамен полностью</a>
        <a href="ege_menu.html" class="btn">По заданиям</a>
      </div>
    </main>

    <footer>
      © 2025 — Демо-версия тренажёра ЕГЭ.
    </footer>
  </div>

  <!-- Общий код -->
  <script type="module">
    import { toggleThemeInit } from '../common.js';
    toggleThemeInit();
  </script>
</body>
</html>
